name: Python

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python tests
    runs-on: ${{ matrix.os }}
    # Windows is best-effort for now — CGO + the DuckDB-via-subprocess
    # fixture both have their own quirks on the Windows runner. Allow the
    # leg to fail without blocking the workflow until it's hardened.
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ['3.10', '3.11', '3.12', '3.13', '3.14']
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install DuckDB CLI (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          curl -sSL https://install.duckdb.org | sh
          echo "$HOME/.duckdb/cli/latest" >> "$GITHUB_PATH"
          "$HOME/.duckdb/cli/latest/duckdb" --version

      - name: Install DuckDB CLI (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = "v1.1.3"
          $url = "https://github.com/duckdb/duckdb/releases/download/${version}/duckdb_cli-windows-amd64.zip"
          Invoke-WebRequest -Uri $url -OutFile "$env:RUNNER_TEMP\duckdb.zip"
          Expand-Archive "$env:RUNNER_TEMP\duckdb.zip" -DestinationPath "$env:RUNNER_TEMP\duckdb"
          "$env:RUNNER_TEMP\duckdb" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:RUNNER_TEMP\duckdb\duckdb.exe" --version

      - name: Install clang-format (macOS)
        if: matrix.os == 'macos-latest'
        run: brew install clang-format

      - name: Install goimports + clang-format (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          sudo apt-get update && sudo apt-get install -y clang-format

      - name: Build c-shared driver library
        run: |
          export PATH="$HOME/go/bin:$PATH"
          case "${{ runner.os }}" in
            macOS)   SUFFIX=dylib ;;
            Windows) SUFFIX=dll   ;;
            *)       SUFFIX=so    ;;
          esac
          go build -buildmode=c-shared -tags driverlib \
            -o "pkg/quack/libadbc_driver_quack.${SUFFIX}" ./pkg/quack
          echo "ADBC_QUACK_LIBRARY=$PWD/pkg/quack/libadbc_driver_quack.${SUFFIX}" >> "$GITHUB_ENV"

      - name: Install Python wheel from source tree
        run: |
          cd python
          python -m pip install --upgrade pip
          python -m pip install -e ".[test]"

      - name: Run Python tests
        run: cd python && pytest -v -m integration

      - name: Upload c-shared driver library
        # Only upload once per OS — every python version produces the
        # same binary so we keep the 3.12 build to avoid duplicates.
        # (Use 3.12 specifically because that's the version packaging.yml
        # also uses for wheel builds.)
        if: matrix.python == '3.12' && matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: libadbc_driver_quack-${{ runner.os }}
          path: pkg/quack/libadbc_driver_quack.*
          if-no-files-found: error

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-${{ matrix.os }}-${{ matrix.python }}
          path: python/*.log
