name: Packaging

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  wheels:
    name: Wheel ${{ matrix.os }} ${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: x86_64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: so
          - os: macos
            arch: x86_64
            runner: macos-13
            goos: darwin
            goarch: amd64
            ext: dylib
          - os: macos
            arch: arm64
            runner: macos-latest
            goos: darwin
            goarch: arm64
            ext: dylib
          - os: windows
            arch: x86_64
            runner: windows-latest
            goos: windows
            goarch: amd64
            ext: dll
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build c-shared driver library
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '1'
        run: |
          go build -buildmode=c-shared -tags driverlib \
            -o "pkg/quack/libadbc_driver_quack.${{ matrix.ext }}" ./pkg/quack
          echo "ADBC_QUACK_LIBRARY=$PWD/pkg/quack/libadbc_driver_quack.${{ matrix.ext }}" >> "$GITHUB_ENV"

      - name: Build wheel
        shell: bash
        run: |
          cd python
          python -m pip install --upgrade pip build
          python -m build --wheel
          ls -la dist/

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os }}-${{ matrix.arch }}
          path: python/dist/*.whl

  publish:
    name: Publish to PyPI
    needs: wheels
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/adbc-driver-quack
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to PyPI via OIDC trusted publishing
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
