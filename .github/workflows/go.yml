name: Go

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: go test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Install DuckDB CLI (for integration tests)
        if: matrix.os == 'ubuntu-latest'
        run: |
          curl -sSL https://install.duckdb.org | sh
          echo "$HOME/.duckdb/cli/latest" >> "$GITHUB_PATH"
          "$HOME/.duckdb/cli/latest/duckdb" --version

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -race -timeout 5m ./...
